version: 2
updates:
  # SDK TypeScript dependencies
  - package-ecosystem: "npm"
    directory: "/sdk"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      lucid-evolution:
        patterns: ["@lucid-evolution/*"]
      effect:
        patterns: ["effect", "@effect/*"]
      typescript-tooling:
        patterns: ["typescript", "tsup", "vitest", "@typescript-eslint/*"]

  # GitHub Actions — minor/patch only to avoid bumping to non-existent major versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
