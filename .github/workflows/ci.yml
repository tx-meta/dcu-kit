name: CI

on:
  push:
    branches: ["main", "staging"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------
  # Job: Verify SDK (TypeScript)
  # ------------------------------------------------------------
  sdk-verify:
    name: 🔧 Verify SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🎨 Format Check
        run: pnpm format:check

      - name: 🔍 Lint
        run: pnpm lint

      - name: 🔍 Type Check
        run: pnpm tsc --noEmit

      - name: 🏗️ Build
        run: pnpm run build

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: sdk-dist
          path: sdk/dist
          retention-days: 7

      - name: 🧪 Run Tests
        run: pnpm test
        env:
          NETWORK: Custom

  # ------------------------------------------------------------
  # Job: Verify On-chain (Aiken)
  # ------------------------------------------------------------
  aiken-verify:
    name: 🛡️ Verify Aiken
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./onchain

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Aiken
        uses: aiken-lang/setup-aiken@v1
        with:
          version: v1.1.22

      - name: 🎨 Check Formatting
        run: aiken fmt --check

      - name: 🏗️ Build Project
        run: aiken build
        env:
          RUST_BACKTRACE: 1

      - name: 🧪 Run Tests
        run: aiken check
        env:
          RUST_BACKTRACE: 1

  # ------------------------------------------------------------
  # Job: Verify Design Specs (Typst)
  # ------------------------------------------------------------
  docs-verify:
    name: 📄 Verify Design Specs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docs/design-specs

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Typst
        uses: typst-community/setup-typst@v3

      - name: 🔨 Compile Design Specs
        run: typst compile dcu-kit.typ

  # ------------------------------------------------------------
  # Job: Gatekeeper (Required Status Check)
  # ------------------------------------------------------------
  ci-success:
    name: ✅ CI Success
    needs: [sdk-verify, aiken-verify, docs-verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check Status
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "❌ One or more jobs failed."
          exit 1
      - name: Success
        run: echo "✅ All checks passed!"
