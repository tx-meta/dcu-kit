name: Publish SDK to npm

# Triggers when you create a GitHub Release (which also creates the git tag).
# The CI workflow already runs on every PR, so tests are guaranteed to have
# passed before any release is created from main.
# workflow_dispatch allows manual publish from the Actions tab if needed.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: 📦 Publish @tx-meta/dcu-kit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk

    permissions:
      contents: read
      id-token: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      # registry-url is required — it writes a .npmrc that wires NODE_AUTH_TOKEN
      # into the npm auth for registry.npmjs.org automatically.
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build
        run: pnpm run build

      - name: 🔍 Check if version already published
        id: version_check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null | grep -q "${PKG_VERSION}"; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "⚠️ ${PKG_NAME}@${PKG_VERSION} is already on npm — skipping publish."
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Publish
        if: steps.version_check.outputs.already_published == 'false'
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
